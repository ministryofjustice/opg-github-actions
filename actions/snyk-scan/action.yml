name: "Snyk Scan"
description: >
  Run snyk test against a docker image. This action is meant to be used in a workflow
  that builds a docker image and then wants to run snyk test against it before pushing
  to a registry.

  The SNYK_TOKEN secret to be set in the repository secrets. 
  The SNYK_TEST_IMAGE input should be set to the name of the docker image to test with snyk,
  including the tag if applicable (e.g. `my-image:latest`).

inputs:
  SNYK_TEST_IMAGE:
    description: "The name of the docker image to test with snyk."
    required: true

  SNYK_TOKEN:
    description: "The snyk token to use for authentication."
    required: true

  sarif_filepath:
    description: "The path to the SARIF file generated by snyk test."
    required: false
    default: "test-results"

  sarif_filename:
    description: "The name of the SARIF file generated by snyk test."
    required: false
    default: "snyk.sarif"

runs:
  using: composite
  steps:
    - name: "Run Snyk Test"
      shell: bash
      env:
        SNYK_TEST_IMAGE: ${{ inputs.SNYK_TEST_IMAGE }}
        SNYK_TOKEN: ${{ inputs.SNYK_TOKEN }}
      run: |
        mkdir -p "${{ inputs.sarif_filepath }}"
        docker compose -f "${{ github.action_path }}/../../docker-compose.yml" run --rm \
          -v "./${{ inputs.sarif_filepath }}:/${{ inputs.sarif_filepath }}" \
          snyk snyk container test "${SNYK_TEST_IMAGE}" --sarif-file-output="/${{ inputs.sarif_filepath }}/${{ inputs.sarif_filename }}"
