name: "[TEST] Public GitHub Actions"

on:
  workflow_dispatch:
  workflow_call:

permissions:
  actions: read
  id-token: write
jobs:

  branch_name_from_env:
    name: "branch-name (from env)"
    runs-on: ubuntu-latest
    steps:
      # checkout self
      - name: "Checkout"
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true
      # run the branch-name action from env values
      - name: "Branch Name"
        id: "branchname"
        uses: ./actions/branch-name
      # summary
      - name: "Summary"
        run: |
          echo "| Variable | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |"  >> $GITHUB_STEP_SUMMARY
          echo "| branch_name | ${{ steps.branchname.outputs.branch_name }} |"  >> $GITHUB_STEP_SUMMARY
          echo "| full_length | ${{ steps.branchname.outputs.full_length }} |"  >> $GITHUB_STEP_SUMMARY
          echo "| safe | ${{ steps.branchname.outputs.safe }} |"  >> $GITHUB_STEP_SUMMARY

  branch_name_fixed:
    name: "branch-name (fixed values)"
    runs-on: ubuntu-latest
    steps:
      # checkout self
      - name: "Checkout"
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true
      # run the branch-name action from env values
      - name: "Branch Name"
        id: "branchname"
        uses: ./actions/branch-name
        with:
          name: "test !/branch name thats really long and has odd things in &!@£$"
      # summary
      - name: "Summary"
        run: |
          echo "| Variable | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |"  >> $GITHUB_STEP_SUMMARY
          echo "| branch_name | ${{ steps.branchname.outputs.branch_name }} |"  >> $GITHUB_STEP_SUMMARY
          echo "| full_length | ${{ steps.branchname.outputs.full_length }} |"  >> $GITHUB_STEP_SUMMARY
          echo "| safe | ${{ steps.branchname.outputs.safe }} |"  >> $GITHUB_STEP_SUMMARY

  terraform_version:
    name: "terraform-version"
    runs-on: ubuntu-latest
    steps:
      # checkout self
      - name: "Checkout"
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: "Terraform Version"
        id: "terraformversion"
        uses: ./actions/terraform-version
        with:
          terraform_directory: ./terraform/account
      # summary
      - name: "Summary"
        run: |
          echo "| Variable | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |"  >> $GITHUB_STEP_SUMMARY
          echo "| version | ${{ steps.terraformversion.outputs.version }} |"  >> $GITHUB_STEP_SUMMARY

  terraform_workspace_manager:
    runs-on: 'ubuntu-latest'
    name: "terraform-workspace-manager"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.ref }}
      - id: test1
        name: "Test registration"
        uses: ./actions/terraform-workspace-manager
        with:
          # sandbox
          oidc_role: ${{ github.ref == 'refs/heads/main' && 'arn:aws:iam::631181914621:role/oidc-opg-github-actions-production' || 'arn:aws:iam::631181914621:role/oidc-opg-github-actions-development' }}
          aws_account_id: '995199299616'
          aws_iam_role: 'gh-reusable-actions-ci'
          register_workspace: "t${{github.sha}}"
          # short ttl
          time_to_protect: 1
      - id: test2
        name: "Test listing"
        uses: ./actions/terraform-workspace-manager
        with:
          oidc_role: ${{ github.ref == 'refs/heads/main' && 'arn:aws:iam::631181914621:role/oidc-opg-github-actions-production' || 'arn:aws:iam::631181914621:role/oidc-opg-github-actions-development' }}
          aws_account_id: '995199299616'
          aws_iam_role: 'gh-reusable-actions-ci'
      - id: test_results
        name: Test results
        run: |
          ws1="t${{github.sha}}"
          pw1="${{steps.test1.outputs.protected_workspaces}}"
          pw2="${{steps.test2.outputs.protected_workspaces}}"

          if [[ "${pw1}" != *"${ws1}"* ]]; then
            echo "workspace not found"
            exit 1
          fi

          if [[ "${pw1}" != "${pw2}" ]]; then
            echo "workspace list has changed"
            exit 1
          fi

  detect_changes:
    name: "detect-changes"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: "Detect changes"
        id: detect
        uses: ./actions/detect-changes
        with:
          paths: |
            actions/**

      - name: "Summary"
        run: |
          if [[ "${{ steps.detect.outputs.has_changes }}" != "true" && "${{ steps.detect.outputs.has_changes }}" != "false" ]]; then
            echo "has_changes is not a valid boolean: ${{ steps.detect.outputs.has_changes }}"
            exit 1
          fi

          if [[ "${{ steps.detect.outputs.only_changed }}" != "true" && "${{ steps.detect.outputs.only_changed }}" != "false" ]]; then
            echo "only_changed is not a valid boolean: ${{ steps.detect.outputs.only_changed }}"
            exit 1
          fi

          echo "| Output | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| has_changes | ${{ steps.detect.outputs.has_changes }} |" >> $GITHUB_STEP_SUMMARY
          echo "| only_changed | ${{ steps.detect.outputs.only_changed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| files | ${{ steps.detect.outputs.files }} |" >> $GITHUB_STEP_SUMMARY

  end:
    name: 'End'
    runs-on: 'ubuntu-latest'
    needs:
      - branch_name_from_env
      - branch_name_fixed
      - terraform_version
      - terraform_workspace_manager
      - detect_changes
    steps:
      - name: "End"
        id: end
        run: echo "End"
